services:
  database:
    image: mongo:8.0.0
    ports:
      - "27017:27017"
    volumes:
      - ${LOCAL_STORAGE_PATH}/mongodb:/data/db
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
  redis:
    image: redis:8.2.4
    ports:
      - "6379:6379"
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    ports:
      - "8000:8000"
    volumes:
      - ${LOCAL_STORAGE_PATH}/static:/app/storage
    depends_on:
      - database
      - redis
    profiles:
      - app
      - test
  backend-tests:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: testing
    volumes:
      - ${LOCAL_STORAGE_PATH}/static:/app/storage
    depends_on:
      - database
      - redis
    environment:
      - AI_ANNOTATOR_DATABASE_NAME=ai_annotator_db_test
      - AI_ANNOTATOR_SECRET_KEY=unittest_secret_key
    profiles:
      - unittest
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: worker
    volumes:
      - ${LOCAL_STORAGE_PATH}/static:/app/storage
    depends_on:
      - database
      - redis
    profiles:
      - app
      - test
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    ports:
      - "5173:80"
    depends_on:
      - backend
    profiles:
      - app
  frontend-tests:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: testing
    volumes:
      - ./frontend:/home
    ports:
      - "5173:5173"
    depends_on:
      - backend
    profiles:
      - test
