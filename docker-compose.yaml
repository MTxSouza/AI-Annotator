services:
  database:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: ai_annotator_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_annotator_backend
    ports:
      - "8000:8000"
    depends_on:
      - database

volumes:
  mongo_data: