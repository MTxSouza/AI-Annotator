services:
  database:
    image: mongo:8.0.0
    container_name: ai_annotator_db
    ports:
      - "27017:27017"
    volumes:
      - ${LOCAL_STORAGE_PATH}/mongodb:/data/db
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
  redis:
    image: redis:8.2.4
    container_name: ai_annotator_redis
    ports:
      - "6379:6379"
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    container_name: ai_annotator_backend
    ports:
      - "8000:8000"
    volumes:
      - ${LOCAL_STORAGE_PATH}/static:/app/storage
    depends_on:
      - database
      - redis
    profiles:
      - app
  backend-tests:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: testing
    container_name: ai_annotator_backend_tests
    volumes:
      - ${LOCAL_STORAGE_PATH}/static:/app/storage
    depends_on:
      - database
      - redis
    environment:
      - AI_ANNOTATOR_DATABASE_NAME=ai_annotator_db_test
    profiles:
      - unittest
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: worker
    container_name: ai_annotator_worker
    volumes:
      - ${LOCAL_STORAGE_PATH}/static:/app/storage
    depends_on:
      - database
      - redis
    profiles:
      - app
  worker-tests:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: worker
    container_name: ai_annotator_worker_tests
    volumes:
      - ${LOCAL_STORAGE_PATH}/static:/app/storage
    depends_on:
      - database
      - redis
    environment:
      - AI_ANNOTATOR_DATABASE_NAME=ai_annotator_db_test
    profiles:
      - unittest
